<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moments of Light</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 页面标题 -->
    <header class="hero">
        <h1>Moments of ZHKU</h1>
        <p>用镜头记录仲恺的温度与色彩</p>
    </header>

    <!-- 摄影作品区 -->
    <main class="gallery">
        <div class="card">
            <img src="images/photo4.jpg" alt="暮色仲恺">
            <div class="content">
                <h3>暮色仲恺</h3>
                <p>天桥上，三角梅绚丽盛放，街边的水果摊透
                    出温暖的灯光，充满人间烟火气。</p>
            </div>
        </div>
        

        <div class="card">
            <img src="images/photo2.jpg" alt="仲园晨曦">
            <div class="content">
                <h3>仲园晨曦</h3>
                <p>清晨的阳光洒落在仲院英东楼前的草坪上，树影婆娑。</p>
            </div>
        </div>

          <div class="card">
            <img src="images/photo5.jpg" alt="仲园猫憩">
            <div class="content">
                <h3>仲园猫憩</h3>
                <p>午后阳光透过树叶洒在树丛上，一只慵懒的猫在草丛中打盹。</p>
            </div>
        </div>
        
        <div class="card">

            <img src="images/photo3.jpg" alt="乐干楼下">

            <div class="content">

                <h3> 乐干楼下</h3>

                <p>乐干楼在绿树掩映下，阳光斑驳地洒在墙面上，时光静好。</p>

            </div>

        </div>

       <div class="card">

            <img src="images/photo1.jpg" alt="霞染花影">

            <div class="content">

                <h3>霞染花影</h3>

                <p>晚霞为花树披上一层温柔的粉色光晕，仲园的傍晚在静谧中绽放独特诗意。</p>

            </div>

        </div>

    </main>

</body>

<footer class="footer">

</footer>
</html>
